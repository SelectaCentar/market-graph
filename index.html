        const colors = {

            'Outlet': '#ff6b6b'        
        };

        let hiddenTypes = new Set();
        const legend = document.getElementById('legend');
        Object.entries(colors).forEach(([type, color]) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="color-box" style="background:${color}"></div>${type}`;
            item.onclick = () => {
                if (hiddenTypes.has(type)) {
                    hiddenTypes.delete(type);
                    item.classList.remove('hidden-type');
                } else {
                    hiddenTypes.add(type);
                    item.classList.add('hidden-type');
                }
                
                // Use built-in force-graph visibility toggles for safe hiding
                Graph.nodeVisibility(n => !hiddenTypes.has(n.type));
                Graph.linkVisibility(l => {
                    const s = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
                    const t = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
                    return !hiddenTypes.has(s.type) && !hiddenTypes.has(t.type);
                });
            };
            legend.appendChild(item);
        });

        // Initialize values for sizing
        graphData.nodes.forEach(node => { node.val = 1; node.vx = 0; node.vy = 0; });
        graphData.links.forEach(link => {
            const w = link.weight || 1;
            const src = graphData.nodes.find(n => n.id === link.source);
            const tgt = graphData.nodes.find(n => n.id === link.target);
            if(src) src.val += w;
            if(tgt) tgt.val += w;
        });

        let highlightNodes = new Set();
        let highlightLinks = new Set();
        let hoverNode = null;

        let currentMode = 'all';
        let modeNodes = new Set();
        let modeLinks = new Set();

        const elem = document.getElementById('graph-container');
        const Graph = ForceGraph()(elem)
            .graphData(graphData)
            .onRenderFramePre((ctx, globalScale) => {
                if (typeof currentLayoutMode !== 'undefined') {
                    if (currentLayoutMode === 'geospatial') {
                        ctx.save();
                        ctx.font = "bold 90px 'Trebuchet MS', Arial, sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillStyle = "rgba(255, 255, 255, 0.07)";
                        ctx.fillText("NORTH AMERICA", -400, 0);
                        ctx.fillText("ASIA", 400, -300);
                        ctx.fillText("EUROPE", 0, 400);
                        ctx.fillText("OTHER", 400, 300);
                        ctx.restore();
                    } else if (currentLayoutMode === 'supply-chain') {
                        ctx.save();
                        ctx.font = "bold 70px 'Trebuchet MS', Arial, sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                        ctx.fillText("SUPPLIERS", -450, -250);
                        ctx.fillText("ROBOT OEMs", 0, 0);
                        ctx.fillText("END USERS", 450, 250);
                        ctx.fillText("INVESTORS", 0, 450);
                        ctx.restore();
                    }
                }
            })

            .nodeId('id')
            .nodeColor(n => {
                if (highlightNodes.size > 0) return highlightNodes.has(n) ? (colors[n.type] || '#ccc') : 'rgba(100,100,100,0.1)';
                if (currentMode !== 'all') return modeNodes.has(n) ? (colors[n.type] || '#ccc') : 'rgba(100,100,100,0.02)';
                return colors[n.type] || '#ccc';
            })
            // Dynamic node sizing: larger when highlighted, or naturally sized by val
            .nodeVal(n => {
                let base = Math.max(2, Math.sqrt(n.val) * 1.5);
                if (highlightNodes.has(n)) base *= 1.5; // swell up when hovered/clicked
                return base;
            })
            .nodeLabel('name')
            .linkColor(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.02)';
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link)) {
                        if ((s.type === 'End User' && t.type === 'Robot OEM') || (t.type === 'End User' && s.type === 'Robot OEM')) {
                            return 'rgba(72, 219, 251, 0.9)'; 
                        }
                        return 'rgba(255,255,255,0.5)'; 
                    }
                    return 'rgba(255,255,255,0.01)';
                }
                return 'rgba(255,255,255,0.15)';
            })
            .linkWidth(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? (link.weight||1) * 1.5 : 0.5;
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link)) {
                        if ((s.type === 'End User' && t.type === 'Robot OEM') || (t.type === 'End User' && s.type === 'Robot OEM')) {
                            return (link.weight||1) * 2.0; 
                        }
                        return (link.weight||1) * 1.0;
                    }
                    return 0;
                }
                return Math.max(1, (link.weight||1) * 0.5);
            })
            .linkDirectionalParticles(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? 4 : 0;
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link) && ((s.type === 'End User' && t.type === 'Robot OEM') || (t.type === 'End User' && s.type === 'Robot OEM'))) {
                        return 4;
                    }
                    return 0;
                }
                return 0;
            })
            .linkDirectionalParticleWidth(3)
            .onLinkClick(link => {
                highlightNodes.clear();
                highlightLinks.clear();
                
                // Clear any active node info UI before switching context
                document.getElementById('selected-node-info').innerHTML = `
                    <div id="selected-name"></div>
                    <div id="selected-type"></div>
                    <div id="selected-desc" style="font-size: 13px; color: #bbb; margin-bottom: 12px; font-style: italic;"></div>
                    <div id="selected-stats" style="display:none; font-size: 12px; color: #ddd; margin-bottom: 12px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px;">

                        <div id="stat-employees" style="margin-bottom: 4px;"></div>

                    <div id="selected-connections"></div>
                `;

                if (link) {
                    highlightLinks.add(link);
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    highlightNodes.add(s);
                    highlightNodes.add(t);
                    updatePanelEdge(link, s, t);
                    
                    Graph.d3Force('charge').strength(n => highlightNodes.has(n) ? -600 : -10);
                    Graph.d3Force('link').distance(l => highlightLinks.has(l) ? 40 : 150);
                    Graph.d3ReheatSimulation();
                    
                    setTimeout(() => {
                        Graph.zoomToFit(1000, 150, n => highlightNodes.has(n));
                    }, 400);
                    
                    Graph.d3Force('charge').strength(n => highlightNodes.has(n) ? -600 : -10);
                    Graph.d3Force('link').distance(l => highlightLinks.has(l) ? 40 : 150);
                    Graph.d3ReheatSimulation();
                    setTimeout(() => {
                        Graph.zoomToFit(1000, 150, n => highlightNodes.has(n));
                    }, 400);
                }
                Graph.nodeColor(Graph.nodeColor())
                     .nodeVal(Graph.nodeVal())
                     .linkWidth(Graph.linkWidth())
                     .linkColor(Graph.linkColor())
                     .linkDirectionalParticles(Graph.linkDirectionalParticles());
            })
            .onNodeHover(node => {
                if (!node && highlightNodes.size === 0) return; // ignore background hover if already empty
                // if we clicked and locked a node, we might want hover to only work if we aren't locked, but let's keep it simple
            })
            .onNodeClick(node => {
                // Focus Mode Triggered by Click
                highlightNodes.clear();
                highlightLinks.clear();
                
                if (node) {
                    highlightNodes.add(node);
                    graphData.links.forEach(link => {
                        const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                        const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                        if (s.id === node.id || t.id === node.id) {
                            highlightLinks.add(link);
                            highlightNodes.add(s);
                            highlightNodes.add(t);
                        }
                    });
                    
                    
                    updatePanel(node);
                    
                    // Filter news to this node
                    currentNewsFilter = node.id;
                    const filterStatus = document.getElementById('news-filter-status');
                    if(filterStatus) {
                        filterStatus.style.display = 'inline-block';
                        filterStatus.innerText = `✖ Clear: ${node.name}`;
                    }
                    renderNewsList();


                    // Re-organize physics to center the clicked node and its cluster
                    Graph.d3Force('charge').strength(n => highlightNodes.has(n) ? -600 : -10);
                    Graph.d3Force('link').distance(l => highlightLinks.has(l) ? 40 : 150);
                    
                    Graph.d3ReheatSimulation();
                    
                    // BUG FIX: Do not fly to old coordinates while physics pushes the node away!
                    // Let the physics settle for a moment, then bound the camera to the new cluster position.
                    setTimeout(() => {
                        Graph.zoomToFit(1000, 150, n => highlightNodes.has(n));
                    }, 400);

                    console.log("[DEBUG] Node clicked:", node.name, "Targeting cluster...");

                } else {
                    // Clicked background -> Reset to current mode
                    document.getElementById('selected-node-info').style.display = 'none';
                    applyFilters(); // Recalculate forces for 'all' or 'deployment' mode
                }

                Graph.nodeColor(Graph.nodeColor())
                     .nodeVal(Graph.nodeVal()) // triggers size update
                     .linkWidth(Graph.linkWidth())
                     .linkColor(Graph.linkColor())
                     .linkDirectionalParticles(Graph.linkDirectionalParticles());
            });

        Graph.nodeCanvasObject((node, ctx, globalScale) => {
            const isHighlighted = highlightNodes.has(node);
            const isInMode = currentMode !== 'all' && modeNodes.has(node);
            const isDimmed = (currentMode !== 'all' && !modeNodes.has(node)) || (highlightNodes.size > 0 && !isHighlighted);

            // Respect legend visibility filter without crashing graph
            if (hiddenTypes && hiddenTypes.has(node.type)) return;

            if (isDimmed && highlightNodes.size > 0 && !isHighlighted) return; // Hide entirely if not related to click

            // Map scaling based on valuation/connections (using val)
            let r = Math.max(4, Math.sqrt(node.val) * 2.0); // Slightly larger base nodes
            if (isHighlighted) r *= 1.5; 

            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
            
            let fillStyle = colors[node.type] || '#ccc';
            if (isDimmed) fillStyle = 'rgba(100,100,100,0.05)';
            
            ctx.fillStyle = fillStyle;
            
            // Highlight stroke
            if (isHighlighted || (currentMode !== 'all' && isInMode)) {
                ctx.lineWidth = 1 / globalScale;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            }
            
            ctx.fill();

            // Semantic Zoom Text: Only show text if zoomed in (globalScale > 1.4), or if highlighted/mode active
            const showText = globalScale > 1.4 || isHighlighted || isInMode;
            
            if (showText && !isDimmed) {
                const label = node.name;
                const fontSize = Math.max(12 / globalScale, 4);
                
                ctx.font = `${isHighlighted ? 'bold' : 'normal'} ${fontSize}px Helvetica`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = (isHighlighted || isInMode) ? '#ffffff' : 'rgba(200,200,200,0.9)';
                
                if (isHighlighted || isInMode) {
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 4;
                }
                
                // Add a slight dark background pill behind text for readability over edges
                const textWidth = ctx.measureText(label).width;

        function getRegion(nodeName) {
            if (regionalMapping['Asia'].includes(nodeName)) return 'Asia';

            return 'US'; // Default
        }

        const clusterForce = function(alpha) {
            graphData.nodes.forEach(node => {
                let targetX = 0, targetY = 0;
                
                if (currentLayoutMode === 'supply-chain') {
                    if (node.type && node.type.startsWith('Supplier')) { targetX = -450; targetY = -250; }
                    else if (node.type === 'Robot OEM') { targetX = 0; targetY = 0; }
                    else if (node.type === 'End User') { targetX = 450; targetY = 250; }
                    else if (node.type === 'Investor') { targetX = 0; targetY = 450; }
                    else if (node.type === 'Target') { targetX = -350; targetY = 350; }
                } else if (currentLayoutMode === 'geospatial') {
                    const region = getRegion(node.name);
                    if (region === 'US') { targetX = -350; targetY = 0; } // North America (Left)
                    else if (region === 'Asia') { targetX = 350; targetY = -250; } // Asia (Top Right)
                    else if (region === 'Europe') { targetX = 0; targetY = 350; } // Europe (Bottom Center)
                    else if (region === 'Other') { targetX = 350; targetY = 250; } // Other (Bottom Right)
                } else {
                    targetX = 0; targetY = 0; // Organic
                }
                
                const pullStrength = currentLayoutMode === 'standard' ? 0.02 : 0.08;
                node.vx -= (node.x - targetX) * alpha * pullStrength;
                node.vy -= (node.y - targetY) * alpha * pullStrength;
            });
        };

        // Semantic Tagging & Signal Strength Logic
        function analyzeNews(headline) {
            const lower = headline.toLowerCase();
            let category = 'general';
            let impact = 'low';

            if (lower.includes('raise') || lower.includes('fund') || lower.includes('million') || lower.includes('billion') || lower.includes('valuation')) {
                category = 'funding';
                impact = 'high';
            } else if (lower.includes('sec') || lower.includes('8-k') || lower.includes('10-k') || lower.includes('proxy') || lower.includes('ownership')) {
                category = 'sec';
                impact = 'high';
            } else if (lower.includes('deploy') || lower.includes('pilot') || lower.includes('acquire') || lower.includes('partner') || lower.includes('deal')) {
                category = 'deploy';
                impact = 'med';
            }

            return { category, impact };
        }

        function renderNewsList() {
            const newsList = document.getElementById('news-list');
            if (!newsList) return;
            newsList.innerHTML = '';
            
            if (graphData.global_news && graphData.global_news.length > 0) {
                const filteredNews = currentNewsFilter ? 
                    graphData.global_news.filter(n => n.involved_nodes && n.involved_nodes.includes(currentNewsFilter)) : 
                    graphData.global_news;

                // Filter by timeframe
                const now = new Date();
                let timeFilteredNews = filteredNews.filter(news => {
                    if (!news.date) return true;
                    const newsDate = new Date(news.date);
                    const diffDays = (now - newsDate) / (1000 * 60 * 60 * 24);
                    
                    if (currentNewsTimeframe === 'today') return diffDays <= 2; // "Today" gives a little buffer (48h) to not be completely empty
                    if (currentNewsTimeframe === 'week') return diffDays <= 7;
                    if (currentNewsTimeframe === 'month') return diffDays <= 30;
                    return true;
                });

                if (timeFilteredNews.length === 0) {
                    newsList.innerHTML = '<span style="color:#888; font-size:12px;">No news found for this timeframe/selection.</span>';
                    return;
                }

                // Map analysis to news items and sort by importance_score (if available via Gemini), then by impact, then by date
                const sortedNews = timeFilteredNews.map(news => {
                    const analysis = analyzeNews(news.headline);
                    // Use Gemini importance_score if available, otherwise fallback to keyword heuristic weight
                    const weight = news.importance_score !== undefined ? news.importance_score : (analysis.impact === 'high' ? 2 : (analysis.impact === 'med' ? 1 : 0));
                    return { news, analysis, weight };
                }).sort((a, b) => {
                    // For week/month, we want the most important ones at the top. For today, mostly recency but still weighted.
                    if (b.weight !== a.weight) return b.weight - a.weight;
                    return new Date(b.news.date) - new Date(a.news.date);

            if(node.revenue) { rEl.innerHTML = `💰 <b>Revenue:</b> ${node.revenue}`; hasStats = true; rEl.style.display='block';} else {rEl.style.display='none';}
            
            const mEl = document.getElementById('stat-marketcap');
            if(node.market_cap) { mEl.innerHTML = `📈 <b>Valuation/Cap:</b> ${node.market_cap}`; hasStats = true; mEl.style.display='block';} else {mEl.style.display='none';}
            
            statsPanel.style.display = hasStats ? 'block' : 'none';

            // Old news ticker removed. News is now handled in the right panel.

            const connectionsDiv = document.getElementById('selected-connections');
            connectionsDiv.innerHTML = '';

            const connections = graphData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
                const t = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
                return s.id === node.id || t.id === node.id;
            });
            
            if (connections.length === 0) {
                connectionsDiv.innerHTML = '<em>No direct connections found.</em>';
                return;
            }

            connections.forEach(link => {
                const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                const isSource = s.id === node.id;
                const otherNode = isSource ? t : s;
                const arrow = isSource ? '→' : '←';
                
                const div = document.createElement('div');
                div.className = 'connection-item';
                div.innerHTML = `<strong>${arrow} ${otherNode.name}</strong><br><span style="color:#aaa; font-size:11px;">${link.relation}</span>`;
                connectionsDiv.appendChild(div);
            });
        }
    </script>
<script>renderNewsList();</script></body>
</html>
