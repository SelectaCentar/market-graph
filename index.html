            'Outlet': '#ff6b6b',        
            'Partner': '#10ac84'        
        };

        const legend = document.getElementById('legend');
        Object.entries(colors).forEach(([type, color]) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="color-box" style="background:${color}"></div>${type}`;
            legend.appendChild(item);
        });

        // Initialize values for sizing
        graphData.nodes.forEach(node => { node.val = 1; node.vx = 0; node.vy = 0; });
        graphData.links.forEach(link => {
            const w = link.weight || 1;
            const src = graphData.nodes.find(n => n.id === link.source);
            const tgt = graphData.nodes.find(n => n.id === link.target);
            if(src) src.val += w;
            if(tgt) tgt.val += w;
        });

        let highlightNodes = new Set();
        let highlightLinks = new Set();
        let hoverNode = null;

        let currentMode = 'all';
        let modeNodes = new Set();
        let modeLinks = new Set();

        const elem = document.getElementById('graph-container');
        const Graph = ForceGraph()(elem)
            .graphData(graphData)
            .nodeId('id')
            .nodeColor(n => {
                if (highlightNodes.size > 0) return highlightNodes.has(n) ? (colors[n.type] || '#ccc') : 'rgba(100,100,100,0.1)';
                if (currentMode !== 'all') return modeNodes.has(n) ? (colors[n.type] || '#ccc') : 'rgba(100,100,100,0.02)';
                return colors[n.type] || '#ccc';
            })
            // Dynamic node sizing: larger when highlighted, or naturally sized by val
            .nodeVal(n => {
                let base = Math.max(2, Math.sqrt(n.val) * 1.5);
                if (highlightNodes.has(n)) base *= 1.5; // swell up when hovered/clicked
                return base;
            })
            .nodeLabel('name')
            .linkColor(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.02)';
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link)) {
                        if ((s.type === 'Customer' && t.type === 'Competitor') || (t.type === 'Customer' && s.type === 'Competitor')) {
                            return 'rgba(72, 219, 251, 0.9)'; 
                        }
                        return 'rgba(255,255,255,0.5)'; 
                    }
                    return 'rgba(255,255,255,0.01)';
                }
                return 'rgba(255,255,255,0.15)';
            })
            .linkWidth(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? (link.weight||1) * 1.5 : 0.5;
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link)) {
                        if ((s.type === 'Customer' && t.type === 'Competitor') || (t.type === 'Customer' && s.type === 'Competitor')) {
                            return (link.weight||1) * 2.0; 
                        }
                        return (link.weight||1) * 1.0;
                    }
                    return 0;
                }
                return Math.max(1, (link.weight||1) * 0.5);
            })
            .linkDirectionalParticles(link => {
                if (highlightLinks.size > 0) return highlightLinks.has(link) ? 4 : 0;
                if (currentMode !== 'all') {
                    const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                    const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                    if (modeLinks.has(link) && ((s.type === 'Customer' && t.type === 'Competitor') || (t.type === 'Customer' && s.type === 'Competitor'))) {
                        return 4;
                    }
                    return 0;
                }
                return 0;
            })
            .linkDirectionalParticleWidth(3)
            .onNodeHover(node => {
                if (!node && highlightNodes.size === 0) return; // ignore background hover if already empty
                // if we clicked and locked a node, we might want hover to only work if we aren't locked, but let's keep it simple
            })
            .onNodeClick(node => {
                // Focus Mode Triggered by Click
                highlightNodes.clear();
                highlightLinks.clear();
                
                if (node) {
                    highlightNodes.add(node);
                    graphData.links.forEach(link => {
                        const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                        const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                        if (s.id === node.id || t.id === node.id) {
                            highlightLinks.add(link);
                            highlightNodes.add(s);
                            highlightNodes.add(t);
                        }
                    });
                    
                    updatePanel(node);

                    // Re-organize physics to center the clicked node and its cluster
                    Graph.d3Force('charge').strength(n => highlightNodes.has(n) ? -600 : -10);
                    Graph.d3Force('link').distance(l => highlightLinks.has(l) ? 40 : 150);
                    
                    Graph.d3ReheatSimulation();
                    
                    // BUG FIX: Do not fly to old coordinates while physics pushes the node away!
                    // Let the physics settle for a moment, then bound the camera to the new cluster position.
                    setTimeout(() => {
                        Graph.zoomToFit(1000, 150, n => highlightNodes.has(n));
                    }, 400);

                    console.log("[DEBUG] Node clicked:", node.name, "Targeting cluster...");

                } else {
                    // Clicked background -> Reset to current mode
                    document.getElementById('selected-node-info').style.display = 'none';
                    applyFilters(); // Recalculate forces for 'all' or 'deployment' mode
                }

                Graph.nodeColor(Graph.nodeColor())
                     .nodeVal(Graph.nodeVal()) // triggers size update
                     .linkWidth(Graph.linkWidth())
                     .linkColor(Graph.linkColor())
                     .linkDirectionalParticles(Graph.linkDirectionalParticles());
            });

        Graph.nodeCanvasObject((node, ctx, globalScale) => {
            const label = node.name;
            const isHighlighted = highlightNodes.has(node);
            const isInMode = currentMode !== 'all' && modeNodes.has(node);
            const isDimmed = (currentMode !== 'all' && !modeNodes.has(node)) || (highlightNodes.size > 0 && !isHighlighted);

            if (isDimmed && highlightNodes.size > 0 && !isHighlighted) return; // Hide entirely if not related to click

            let r = Math.max(2, Math.sqrt(node.val) * 1.5);
            if (isHighlighted) r *= 1.5; // Match nodeVal visual swell

            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
            
            let fillStyle = colors[node.type] || '#ccc';
            if (isDimmed) fillStyle = 'rgba(100,100,100,0.05)';
            ctx.fillStyle = fillStyle;
            ctx.fill();

            // Text
            if (!isDimmed || currentMode === 'all') {
                let baseSize = 10 / globalScale;
                if (isInMode) baseSize = 16 / globalScale; 
                if (isHighlighted) baseSize = 20 / globalScale; 

                const fontSize = Math.max(baseSize, (isInMode || isHighlighted) ? 6 : 3);
                
                ctx.font = `${isHighlighted ? 'bold' : 'normal'} ${fontSize}px Helvetica`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = (isInMode || isHighlighted) ? '#ffffff' : 'rgba(255,255,255,0.7)';
                
                if (isHighlighted || isInMode) {
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 4;
                }
                ctx.fillText(label, node.x, node.y + r + (isHighlighted ? 4 : 2));
                ctx.shadowBlur = 0; 
            }
        });

        // Initial Physics
        Graph.d3Force('charge').strength(-400);
        Graph.d3Force('link').distance(70);

        function debugGraph() {
            console.log("[DEBUG MODE] Initiated.");
            console.log("Nodes:", graphData.nodes);
            console.log("Edges:", graphData.links);
            console.log("Highlighted Nodes:", Array.from(highlightNodes).map(n => n.name));
            
            // Force a complete reset to prevent getting lost in dark space
            setMode('all');
            highlightNodes.clear();
            highlightLinks.clear();
            document.getElementById('selected-node-info').style.display = 'none';
            
            Graph.d3Force('charge').strength(-400);
            Graph.d3Force('link').distance(70);
            Graph.d3ReheatSimulation();
            
            Graph.nodeColor(Graph.nodeColor())
                 .nodeVal(Graph.nodeVal())
                 .linkWidth(Graph.linkWidth())
                 .linkColor(Graph.linkColor())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());
            
            setTimeout(() => {
                Graph.zoomToFit(1000, 50);
            }, 300);
            
            alert("Debug data dumped to browser console (F12). View has been reset and centered.");
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode-all').className = mode === 'all' ? 'btn active' : 'btn';
            document.getElementById('btn-mode-deployment').className = mode === 'deployment' ? 'btn active' : 'btn';
            
            const newsBtn = document.getElementById('btn-mode-news');
            if (newsBtn) newsBtn.className = mode === 'news' ? 'btn active' : 'btn';
            
            highlightNodes.clear();
            highlightLinks.clear();
            document.getElementById('selected-node-info').style.display = 'none';
            
            const newsPanel = document.getElementById('daily-news-panel');
            if (newsPanel) {
                if (mode === 'news') {
                    newsPanel.style.display = 'block';
                    renderNewsList();
                } else {
                    newsPanel.style.display = 'none';
                }
            }

            applyFilters();
        }

        function renderNewsList() {
            const newsList = document.getElementById('news-list');
            if (!newsList) return;
            newsList.innerHTML = '';
            
            if (graphData.global_news && graphData.global_news.length > 0) {
                graphData.global_news.forEach(news => {
                    const item = document.createElement('div');
                    item.style.cssText = "margin-bottom:10px; padding:8px; background:rgba(0,0,0,0.3); border-left:2px solid #ff9ff3; border-radius:4px; cursor:pointer; transition:0.2s;";
                    item.innerHTML = `<span style="color:#888; font-size:10px;">${news.date}</span><br><span style="color:#fff; font-size:12px;">${news.headline}</span>`;
                    
                    item.onmouseenter = () => {
                        item.style.background = 'rgba(255,255,255,0.1)';
                        highlightNodes.clear();
                        highlightLinks.clear();
                        news.involved_nodes.forEach(nid => {
                            const node = graphData.nodes.find(n => n.id === nid);
                            if(node) highlightNodes.add(node);
                        });
                        
                        Graph.nodeColor(Graph.nodeColor())
                             .nodeVal(Graph.nodeVal());
                    };
                    
                    item.onmouseleave = () => {
                        item.style.background = 'rgba(0,0,0,0.3)';
                        highlightNodes.clear();
                        Graph.nodeColor(Graph.nodeColor())
                             .nodeVal(Graph.nodeVal());
                    };
                    
                    item.onclick = () => {
                        window.open(news.url, '_blank');
                    };
                    
                    newsList.appendChild(item);
                });
            } else {
                newsList.innerHTML = '<span style="color:#888; font-size:12px;">No recent news available.</span>';
            }
        }

        function applyFilters() {
            modeNodes.clear();
            modeLinks.clear();
            
            if (currentMode === 'deployment') {
                const deploymentLinks = graphData.links.filter(l => {
                    const s = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
                    const t = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
                    return (s.type === 'Customer' && t.type === 'Competitor') || 
                           (t.type === 'Customer' && s.type === 'Competitor');
                });
                
                deploymentLinks.forEach(l => {
                    modeLinks.add(l);
                    modeNodes.add(typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source));
                    modeNodes.add(typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target));
                });
                
                const activeCompetitors = new Set(Array.from(modeNodes).filter(n => n.type === 'Competitor'));
                
                graphData.links.forEach(l => {
                    const s = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
                    const t = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
                    if (activeCompetitors.has(s) && t.type !== 'Customer') {
                        modeLinks.add(l);
                        modeNodes.add(s);
                        modeNodes.add(t);
                    } else if (activeCompetitors.has(t) && s.type !== 'Customer') {
                        modeLinks.add(l);
                        modeNodes.add(s);
                        modeNodes.add(t);
                    }
                });

                Graph.d3Force('charge').strength(n => modeNodes.has(n) ? -800 : -20);
                Graph.d3Force('link').distance(l => modeLinks.has(l) ? 100 : 20);
            } else {
                Graph.d3Force('charge').strength(-400);
                Graph.d3Force('link').distance(70);
            }
            
            Graph.d3ReheatSimulation();
            
            Graph.nodeColor(Graph.nodeColor())
                 .nodeVal(Graph.nodeVal())
                 .linkWidth(Graph.linkWidth())
                 .linkColor(Graph.linkColor())
                 .linkDirectionalParticles(Graph.linkDirectionalParticles());

            setTimeout(() => {
                if (currentMode !== 'all') {
                    Graph.zoomToFit(1000, 80, n => modeNodes.has(n));
                } else {
                    Graph.zoomToFit(1000, 50);
                }
            }, 600);
        }

        function updatePanel(node) {
            const panel = document.getElementById('selected-node-info');
            if (!node) return;
            
            panel.style.display = 'block';
            document.getElementById('selected-name').innerText = node.name;
            document.getElementById('selected-name').style.color = colors[node.type] || '#fff';
            document.getElementById('selected-type').innerText = node.type;
            
            const descEl = document.getElementById('selected-desc');
            if (node.description) {
                descEl.innerText = node.description;
                descEl.style.display = 'block';
            } else {
                descEl.style.display = 'none';
            }

            // Update stats
            const statsPanel = document.getElementById('selected-stats');
            let hasStats = false;
            
            const wEl = document.getElementById('stat-website');
            if(node.website) { wEl.innerHTML = `🌐 <a href="${node.website}" target="_blank" style="color:#48dbfb; text-decoration:none;">${node.website}</a>`; hasStats = true; wEl.style.display='block';} else {wEl.style.display='none';}
            
            const eEl = document.getElementById('stat-employees');
            if(node.employees) { eEl.innerHTML = `👥 <b>Employees:</b> ${node.employees}`; hasStats = true; eEl.style.display='block';} else {eEl.style.display='none';}
            
            const rEl = document.getElementById('stat-revenue');
            if(node.revenue) { rEl.innerHTML = `💰 <b>Revenue:</b> ${node.revenue}`; hasStats = true; rEl.style.display='block';} else {rEl.style.display='none';}
            
            const mEl = document.getElementById('stat-marketcap');
            if(node.market_cap) { mEl.innerHTML = `📈 <b>Valuation/Cap:</b> ${node.market_cap}`; hasStats = true; mEl.style.display='block';} else {mEl.style.display='none';}
            
            statsPanel.style.display = hasStats ? 'block' : 'none';

            // Update News
            const newsPanel = document.getElementById('selected-news');
            const ticker = document.getElementById('news-ticker');
            ticker.innerHTML = '';
            if (node.news && node.news.length > 0) {
                node.news.forEach(item => {
                    ticker.innerHTML += `<div style="margin-bottom:6px; border-left:2px solid #1dd1a1; padding-left:6px;">
                        <span style="color:#888; font-size:9px;">${item.date}</span><br>
                        <a href="${item.url}" target="_blank" style="color:#ccc; text-decoration:none;">${item.headline}</a>
                    </div>`;
                });
                newsPanel.style.display = 'block';
            } else {
                newsPanel.style.display = 'none';
            }

            const connectionsDiv = document.getElementById('selected-connections');
            connectionsDiv.innerHTML = '';

            const connections = graphData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
                const t = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
                return s.id === node.id || t.id === node.id;
            });
            
            if (connections.length === 0) {
                connectionsDiv.innerHTML = '<em>No direct connections found.</em>';
                return;
            }

            connections.forEach(link => {
                const s = typeof link.source === 'object' ? link.source : graphData.nodes.find(n => n.id === link.source);
                const t = typeof link.target === 'object' ? link.target : graphData.nodes.find(n => n.id === link.target);
                const isSource = s.id === node.id;
                const otherNode = isSource ? t : s;
                const arrow = isSource ? '→' : '←';
                
                const div = document.createElement('div');
                div.className = 'connection-item';
                div.innerHTML = `<strong>${arrow} ${otherNode.name}</strong><br><span style="color:#aaa; font-size:11px;">${link.relation}</span>`;
                connectionsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
